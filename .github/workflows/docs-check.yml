name: Docs Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.github/workflows/docs-check.yml'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.github/workflows/docs-check.yml'

permissions:
  contents: read

jobs:
  links-and-spelling-placeholder:
    name: Lightweight docs placeholder
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm docs are present
        shell: bash
        run: |
          test -f README.md
          test -f LICENSE
          test -f docs/REQUIREMENTS.md
          test -f docs/PLATFORM_CAPABILITIES.md
